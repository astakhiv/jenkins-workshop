jenkins:
 securityRealm:
   local:
     allowsSignup: false
     users:
       - id: ${JENKINS_ADMIN_ID:-admin}
         password: ${JENKINS_ADMIN_PASSWORD:-admin}
       - id: developer
         password: dev_pass
 authorizationStrategy:
   globalMatrix:
     permissions:
       - "Overall/Administer:admin"
       - "Overall/Read:developer"
       - "Job/Read:developer"
       - "View/Read:developer"
       - "Job/Build:developer"
tool:
  terraform:
    installations:
      - name: "terraform-1.15.8"
        properties:
          - installSource:
              installers:
                - terraformInstaller:
                    id: "1.15.8-linux-amd64"
unclassified:
  location:
    url: ${JENKINS_URL}
